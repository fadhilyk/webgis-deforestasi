<!-- =================================================================== -->
<!-- TAB 1: PETA HASIL — Leaflet Map + Layer Controls                    -->
<!-- Included by base.html as partial template                       -->
<!-- =================================================================== -->

<div class="card card-glass mb-3">
    <div class="card-body p-0">
        <!-- Leaflet Map Container -->
        <div id="map" style="height: 520px; width: 100%; border-radius: 0.5rem;"></div>
    </div>
</div>

<!-- Layer Controls -->
<div class="row g-3 mb-3">
    <div class="col-12">
        <div class="card card-glass">
            <div class="card-body">
                <h6 class="card-title mb-3">
                    <i class="bi bi-layers me-2"></i>Kontrol Layer
                </h6>
                <div class="d-flex flex-wrap gap-2">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="layer-batas"
                               checked data-layer="batas-wilayah">
                        <label class="form-check-label small" for="layer-batas">
                            <span class="legend-color" style="background:#3388ff;"></span>
                            Batas Wilayah
                        </label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="layer-gain"
                               checked data-layer="gain">
                        <label class="form-check-label small" for="layer-gain">
                            <span class="legend-color" style="background:#2ecc71;"></span>
                            Gain (Pertambahan)
                        </label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="layer-loss"
                               checked data-layer="loss">
                        <label class="form-check-label small" for="layer-loss">
                            <span class="legend-color" style="background:#e74c3c;"></span>
                            Loss (Kehilangan)
                        </label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="layer-target2024"
                               data-layer="target-2024">
                        <label class="form-check-label small" for="layer-target2024">
                            <span class="legend-color" style="background:#f39c12;"></span>
                            Target 2024
                        </label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="layer-target2025"
                               data-layer="target-2025">
                        <label class="form-check-label small" for="layer-target2025">
                            <span class="legend-color" style="background:#9b59b6;"></span>
                            Target 2025
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
